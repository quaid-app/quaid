name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy (default / airgapped channel)
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo clippy (online channel)
        run: cargo clippy --all-targets --no-default-features --features bundled,online-model -- -D warnings

      - name: Cargo check
        run: cargo check --all-targets

  release-macos-preflight:
    name: Release macOS preflight
    runs-on: macos-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            features: bundled,embedded-model
            channel: airgapped
          - target: x86_64-apple-darwin
            features: bundled,embedded-model
            channel: airgapped
          - target: aarch64-apple-darwin
            features: bundled,online-model
            channel: online
          - target: x86_64-apple-darwin
            features: bundled,online-model
            channel: online
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.channel }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-check-

      - name: Cargo check release target
        run: cargo check --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests (default / airgapped channel)
        run: cargo test --verbose

      - name: Run tests (online channel)
        run: cargo test --verbose --no-default-features --features bundled,online-model
        env:
          QUAID_FORCE_HASH_SHIM: "1"

      - name: Run installer profile tests
        run: sh tests/install_profile.sh

      - name: Run release asset parity tests
        run: sh tests/release_asset_parity.sh

      - name: Run installer release seam tests
        run: sh tests/install_release_seam.sh

  benchmarks:
    name: Offline Benchmarks
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run offline benchmarks
        run: |
          cargo test --test corpus_reality --test concurrency_stress --test embedding_migration --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Generate coverage summary
        run: |
          cargo llvm-cov report 2>&1 | tee coverage-summary.txt
          {
            echo "## 📊 Coverage Report"
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.txt

      - name: Upload to Codecov (optional, non-blocking)
        if: >-
          env.CODECOV_TOKEN != '' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v4
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false
