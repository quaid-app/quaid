name: Conversation Memory Benchmarks

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "§8 subsection to run"
        required: false
        default: "all"
      limit:
        description: "Question limit per subsection (informational smoke only)"
        required: false
        default: "25"
      model_alias:
        description: "Extraction model alias"
        required: false
        default: "phi-3.5-mini"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  dab-section8:
    name: DAB §8 hosted-runner smoke
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conversation-memory-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache benchmark datasets
        uses: actions/cache@v4
        with:
          path: benchmarks/datasets
          key: conversation-memory-datasets-${{ hashFiles('benchmarks/datasets.lock') }}

      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: ~/.quaid/models
          key: conversation-memory-models-${{ github.event.inputs.model_alias }}

      - name: Explain truth boundary
        run: |
          {
            echo "## DAB §8 hosted-runner smoke"
            echo ""
            echo "This workflow exercises the full conversation-memory path on github-hosted Linux."
            echo "It is **not** the authoritative regression gate because github-hosted runners are not representative hardware."
            echo "Use \`python benchmarks/dab_section8.py\` with no \`--limit\` on representative Unix hardware to record or compare baselines."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download pinned datasets
        run: |
          chmod +x benchmarks/prep_datasets.sh
          ./benchmarks/prep_datasets.sh locomo longmemeval

      - name: Install Python benchmark dependencies
        run: python -m pip install -r benchmarks/requirements.txt

      - name: Build release binary
        run: cargo build --release

      - name: Run DAB §8 hosted smoke
        run: |
          python benchmarks/dab_section8.py \
            --dataset "${{ github.event.inputs.dataset || 'all' }}" \
            --limit "${{ github.event.inputs.limit || '25' }}" \
            --model-alias "${{ github.event.inputs.model_alias || 'phi-3.5-mini' }}" \
            --json > benchmarks-section8-results.json

      - name: Upload §8 results artifact
        uses: actions/upload-artifact@v4
        with:
          name: dab-section8-results
          path: benchmarks-section8-results.json
