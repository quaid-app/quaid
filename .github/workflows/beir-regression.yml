name: BEIR Regression Gate

on:
  push:
    branches: ["release/**"]
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      subset:
        description: "Dataset subset to evaluate (all, nq, fiqa)"
        required: false
        default: "all"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  beir:
    name: BEIR nDCG@10 Regression
    runs-on: ubuntu-latest
    # Harness failures (compile errors, panics, regressions vs baseline) are
    # blocking. Dataset downloads from public.ukp.informatik.tu-darmstadt.de can
    # stall, so only the download step is resilient (bounded timeout +
    # continue-on-error); evaluation is skipped when the download fails.
    # NOTE: nq/fiqa baselines in benchmarks/baselines/beir.json are still
    # pending recording (ndcg_at_10: null), so the eval tests early-return
    # without asserting until real baselines are committed.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-beir-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache benchmark datasets
        uses: actions/cache@v4
        with:
          path: benchmarks/datasets
          key: beir-datasets-${{ hashFiles('benchmarks/datasets.lock') }}

      - name: Download pinned datasets
        id: download
        # Bounded at 15 min so a stalled UKP host never consumes the full runner budget.
        timeout-minutes: 15
        continue-on-error: true
        run: |
          chmod +x benchmarks/prep_datasets.sh
          ./benchmarks/prep_datasets.sh ${{ github.event.inputs.subset || 'all' }}

      - name: Run BEIR regression tests
        # Skip evaluation when dataset download did not succeed; keeps benchmark
        # signal intact on successful downloads while avoiding false failures.
        if: steps.download.outcome == 'success'
        run: |
          cargo test --release --test beir_eval -- --ignored --nocapture
