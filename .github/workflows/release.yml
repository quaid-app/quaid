name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: gbrain-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: gbrain-darwin-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: gbrain-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: gbrain-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux musl via cross)
        if: matrix.os == 'ubuntu-latest'
        env:
          CFLAGS: >-
            -Du_int8_t=uint8_t
            -Du_int16_t=uint16_t
            -Du_int32_t=uint32_t
            -Du_int64_t=uint64_t
            -Wno-incompatible-pointer-types
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/gbrain ${{ matrix.artifact }}

      - name: Verify static binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          file ${{ matrix.artifact }}
          file ${{ matrix.artifact }} | grep -q "statically linked" \
            || (echo "ERROR: binary is not statically linked" && exit 1)

      - name: Generate SHA-256 checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Verify all release artifacts exist
        run: |
          expected=(
            gbrain-darwin-arm64
            gbrain-darwin-arm64.sha256
            gbrain-darwin-x86_64
            gbrain-darwin-x86_64.sha256
            gbrain-linux-x86_64
            gbrain-linux-x86_64.sha256
            gbrain-linux-aarch64
            gbrain-linux-aarch64.sha256
          )
          missing=0
          for f in "${expected[@]}"; do
            if [ ! -f "artifacts/$f" ]; then
              echo "::error::Missing expected release artifact: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
          echo "All 8 release artifacts present"

      - name: Re-verify checksums after download
        run: |
          cd artifacts
          for bin in gbrain-darwin-arm64 gbrain-darwin-x86_64 gbrain-linux-x86_64 gbrain-linux-aarch64; do
            echo "Verifying $bin..."
            shasum -a 256 --check "$bin.sha256"
          done
          echo "All checksums verified"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          body: |
            ## Install

            Download the pre-built binary for your platform from the assets below and verify the checksum:

            ```bash
            VERSION="${{ github.ref_name }}"
            PLATFORM="darwin-arm64"   # darwin-arm64 | darwin-x86_64 | linux-x86_64 | linux-aarch64
            curl -fsSL "https://github.com/macro88/gigabrain/releases/download/${VERSION}/gbrain-${PLATFORM}" -o "gbrain-${PLATFORM}"
            curl -fsSL "https://github.com/macro88/gigabrain/releases/download/${VERSION}/gbrain-${PLATFORM}.sha256" -o "gbrain-${PLATFORM}.sha256"
            shasum -a 256 --check "gbrain-${PLATFORM}.sha256"
            sudo install -m 755 "gbrain-${PLATFORM}" /usr/local/bin/gbrain
            ```

            Or build from source: `cargo build --release`

            **Supported channels:** GitHub Releases and build from source.
            npm, Homebrew, and one-command installer scripts are not available in this release.

            ---
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
