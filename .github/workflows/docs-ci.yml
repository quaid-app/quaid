name: Docs CI

# Runs only when website/ changes (no Rust code touched).
# Reports the same required-check names ("Check" and "Test") so branch
# protection is satisfied without running the full Rust CI suite.

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
  pull_request:
    branches: ["main"]
    paths:
      - "website/**"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build docs site
        working-directory: website
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Docs-only change
        run: echo "No Rust tests required for docs-only changes."
