name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "benchmarks/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Cross.toml"
      - "scripts/**"
      - ".githooks/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - ".github/release-assets.txt"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "benchmarks/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Cross.toml"
      - "scripts/**"
      - ".githooks/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - ".github/release-assets.txt"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Verify protected-branch hook bootstrap
        run: |
          sh scripts/setup-git-hooks.sh
          test "$(git config --local --get core.hooksPath)" = ".githooks"
          if printf 'refs/heads/fix/test 1111111111111111111111111111111111111111 refs/heads/main 2222222222222222222222222222222222222222\n' | .githooks/pre-push origin https://github.com/quaid-app/quaid; then
            echo "::error::.githooks/pre-push allowed a direct push to main"
            exit 1
          fi
          printf 'refs/heads/fix/test 1111111111111111111111111111111111111111 refs/heads/fix/test 0000000000000000000000000000000000000000\n' | .githooks/pre-push origin https://github.com/quaid-app/quaid

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy (default / airgapped channel)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Cargo clippy (online channel)
        run: cargo clippy --all-targets --no-default-features --features bundled,online-model --locked -- -D warnings

      - name: Cargo doc (default / airgapped channel)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --locked

      - name: Cargo doc (online channel)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --no-default-features --features bundled,online-model --locked

      - name: Cargo check
        run: cargo check --all-targets

  release-macos-preflight:
    name: Release macOS preflight
    runs-on: macos-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            features: bundled,embedded-model
            channel: airgapped
          - target: x86_64-apple-darwin
            features: bundled,embedded-model
            channel: airgapped
          - target: aarch64-apple-darwin
            features: bundled,online-model
            channel: online
          - target: x86_64-apple-darwin
            features: bundled,online-model
            channel: online
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.channel }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-check-

      - name: Cargo check release target
        run: cargo check --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests (default / airgapped channel)
        run: cargo nextest run --locked

      - name: Free target space before online channel tests
        run: cargo clean

      - name: Run tests (online channel)
        run: cargo nextest run --locked -j 1 --no-default-features --features bundled,online-model,test-harness
        env:
          QUAID_FORCE_HASH_SHIM: "1"

      - name: Run installer profile tests
        run: sh tests/install_profile.sh

      - name: Run release asset parity tests
        run: sh tests/release_asset_parity.sh

      - name: Run installer release seam tests
        run: sh tests/install_release_seam.sh

  benchmarks:
    name: Offline Benchmarks
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run offline functional benchmarks
        run: |
          cargo test --test corpus_reality --test concurrency_stress --test embedding_migration --verbose

      - name: Run latency gate (release build)
        env:
          # Hosted runners are slower and noisier than representative local
          # hardware; relax the default 250ms p95 budget to a runner-safe bound.
          QUAID_LATENCY_P95_MS: "500"
        run: |
          cargo test --release --test corpus_reality latency_100_queries_p95 -- --ignored --nocapture

  mini-bench:
    name: Mini-Bench Retrieval Gate
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-minibench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Run mini-bench retrieval gate (fails below 8/20)
        run: ./scripts/mini-bench.sh --no-build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Generate coverage summary
        run: |
          cargo llvm-cov report 2>&1 | tee coverage-summary.txt
          {
            echo "## 📊 Coverage Report"
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.txt

      - name: Upload to Codecov (optional, non-blocking)
        if: >-
          env.CODECOV_TOKEN != '' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v4
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false
