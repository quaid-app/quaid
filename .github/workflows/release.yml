name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify-version:
    name: Verify Cargo.toml version matches release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(awk -F'"' '/^\s*version\s*=\s*"/{print $2; exit}' Cargo.toml)
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Failed to extract version from Cargo.toml"
            exit 1
          fi
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but release tag is $TAG_VERSION"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

  build:
    name: Build ${{ matrix.channel }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            channel: airgapped
            features: bundled,embedded-model
            artifact: quaid-darwin-arm64-airgapped
          - target: x86_64-apple-darwin
            os: macos-latest
            channel: airgapped
            features: bundled,embedded-model
            artifact: quaid-darwin-x86_64-airgapped
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            channel: airgapped
            features: bundled,embedded-model
            artifact: quaid-linux-x86_64-airgapped
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            channel: airgapped
            features: bundled,embedded-model
            artifact: quaid-linux-aarch64-airgapped
          - target: aarch64-apple-darwin
            os: macos-latest
            channel: online
            features: bundled,online-model
            artifact: quaid-darwin-arm64-online
          - target: x86_64-apple-darwin
            os: macos-latest
            channel: online
            features: bundled,online-model
            artifact: quaid-darwin-x86_64-online
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            channel: online
            features: bundled,online-model
            artifact: quaid-linux-x86_64-online
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            channel: online
            features: bundled,online-model
            artifact: quaid-linux-aarch64-online

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Build (Linux musl via cross)
        if: matrix.os == 'ubuntu-latest'
        env:
          CFLAGS: >-
            -Du_int8_t=uint8_t
            -Du_int16_t=uint16_t
            -Du_int32_t=uint32_t
            -Du_int64_t=uint64_t
            -Wno-incompatible-pointer-types
        run: cross build --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/quaid ${{ matrix.artifact }}

      - name: Verify static binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          file ${{ matrix.artifact }}
          file ${{ matrix.artifact }} | grep -qE "statically linked|static-pie linked" \
            || (echo "ERROR: binary is not statically linked" && exit 1)

      - name: Generate SHA-256 checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Stage install.sh asset
        run: cp scripts/install.sh artifacts/install.sh

      - name: Verify release manifest
        run: |
          mapfile -t expected < <(grep -Ev '^(#|$)' .github/release-assets.txt)
          missing=0
          for f in "${expected[@]}"; do
            if [ ! -f "artifacts/$f" ]; then
              echo "::error::Missing expected release artifact: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
          actual_count=$(find artifacts -maxdepth 1 -type f | wc -l | tr -d ' ')
          expected_count=${#expected[@]}
          if [ "$actual_count" -ne "$expected_count" ]; then
            echo "::error::Expected ${expected_count} release files but found ${actual_count}"
            find artifacts -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi
          binary_count=$(printf '%s\n' "${expected[@]}" | grep -Evc '(\.sha256$|^install\.sh$)')
          echo "Verified ${expected_count} release files (${binary_count} binaries + ${binary_count} checksums + install.sh)"

      - name: Re-verify checksums after download
        run: |
          cd artifacts
          while IFS= read -r bin; do
            echo "Verifying $bin..."
            shasum -a 256 --check "$bin.sha256"
          done < <(grep -Ev '^(#|$|install\.sh$|.*\.sha256$)' ../.github/release-assets.txt)
          echo "All checksums verified"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          body: |
            ## Install

            Default airgapped installer:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/quaid-app/quaid/${{ github.ref_name }}/scripts/install.sh | sh
            ```

            Online installer override:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/quaid-app/quaid/${{ github.ref_name }}/scripts/install.sh \
              | QUAID_CHANNEL=online sh
            ```

            Manual downloads use the channel-suffixed assets:

            ```bash
            VERSION="${{ github.ref_name }}"
            PLATFORM="darwin-arm64"   # darwin-arm64 | darwin-x86_64 | linux-x86_64 | linux-aarch64

            AIRGAPPED_ASSET="quaid-${PLATFORM}-airgapped"
            ONLINE_ASSET="quaid-${PLATFORM}-online"

            curl -fsSL "https://github.com/quaid-app/quaid/releases/download/${VERSION}/${AIRGAPPED_ASSET}" -o "${AIRGAPPED_ASSET}"
            curl -fsSL "https://github.com/quaid-app/quaid/releases/download/${VERSION}/${AIRGAPPED_ASSET}.sha256" -o "${AIRGAPPED_ASSET}.sha256"
            shasum -a 256 --check "${AIRGAPPED_ASSET}.sha256"

            curl -fsSL "https://github.com/quaid-app/quaid/releases/download/${VERSION}/${ONLINE_ASSET}" -o "${ONLINE_ASSET}"
            curl -fsSL "https://github.com/quaid-app/quaid/releases/download/${VERSION}/${ONLINE_ASSET}.sha256" -o "${ONLINE_ASSET}.sha256"
            shasum -a 256 --check "${ONLINE_ASSET}.sha256"
            ```

            Or build from source:

            ```bash
            cargo build --release
            cargo build --release --no-default-features --features bundled,online-model
            ```

            > **npm — planned follow-on, not yet available.** `quaid` is not in the public
            > npm registry. Use the shell installer or a GitHub Releases binary above.
            >
            > Install docs: https://github.com/quaid-app/quaid/blob/${{ github.ref_name }}/docs/getting-started.md
            >
            > Pre-rename upgrade path: https://github.com/quaid-app/quaid/blob/${{ github.ref_name }}/MIGRATION.md

            ---

            ## Highlights

            See the auto-generated release notes below for the merged changes included in
            `${{ github.ref_name }}`. Keep this workflow body evergreen: install guidance lives
            here; version-specific feature summaries belong in the PR history and generated notes.

            ---
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

